schema: bymsg/v1
package: com.example.user

messages:
  UserProfile:
    fields:
      id:
        type: uint32
        tag: 1
        description:
          zh: "用户ID"
          en: "User ID"
      name:
        type: string
        tag: 2
        description:
          zh: "用户名"
          en: "Username"
      email:
        type: string
        tag: 3
        description:
          zh: "邮箱"
          en: "Email"
      tags:
        type: list<string>
        tag: 4
        description:
          zh: "标签"
          en: "Tags"
      metadata:
        type: map<string, string>
        tag: 5
        description:
          zh: "元数据"
          en: "Metadata"
    description:
      zh: "用户资料"
      en: "User Profile"

  Address:
    fields:
      street:
        type: string
        tag: 1
      city:
        type: string
        tag: 2
      zip:
        type: string
        tag: 3
    description:
      zh: "地址"
      en: "Address"

enums:
  UserType:
    values:
      ADMIN: 0
      USER: 1
      GUEST: 2
    description:
      zh: "用户类型"
      en: "User Type"

  Status:
    values:
      ACTIVE: 0
      INACTIVE: 1
      BANNED: 2
    description:
      zh: "状态"
      en: "Status"
